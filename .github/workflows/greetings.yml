permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  greet:
    uses: kubestellar/infra/.github/workflows/reusable-greetings.yml@1a04a3fd17771e78e5cf6d42a3fda84e3ba478f3  # main@2026-06-19
