name: Auth Drift

on:
  push:
    branches:
      - main
    paths:
      - 'web/src/components/auth/**'
      - 'web/src/lib/auth.tsx'
      - 'web/src/lib/api.ts'
      - 'web/vite.config.ts'
      - 'web/e2e/auth-drift/**'
      - 'web/package.json'
      - 'web/package-lock.json'
      - 'web/playwright.config.ts'
      - '.github/actions/auth-drift-setup/**'
      - '.github/workflows/auth-drift.yml'
      - '.github/workflows/auth-drift-failure-issue.yml'
  pull_request:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      auth_drift_login_url:
        description: 'Optional OAuth-enabled console login URL to validate, for example https://staging.example.com/login'
        required: false
        default: ''
        type: string

permissions: read-all

concurrency:
  group: auth-drift-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: 'true'

jobs:
  local-login-ui-drift:
    name: Local Login UI Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web
    env:
      AUTH_DRIFT_JOB_NAME: Local Login UI Drift
      AUTH_DRIFT_DEMO_URL: ${{ vars.AUTH_DRIFT_DEMO_URL || 'https://console.kubestellar.io' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/auth-drift-setup

      - name: Write auth drift context
        run: |
          mkdir -p e2e/test-results/auth-drift-context
          node <<'NODE'
          const fs = require('fs');
          const context = {
            job: process.env.AUTH_DRIFT_JOB_NAME,
            suite: 'oauth-staging-login-drift.spec.ts',
            target: {
              type: 'local-vite-mocked-oauth-ui',
              loginUrl: 'http://127.0.0.1:4176/login',
            },
            expectedContract: 'OAuth login card, GitHub button, branding, and mobile layout remain visually stable.',
          };
          fs.writeFileSync('e2e/test-results/auth-drift-context/context.json', JSON.stringify(context, null, 2));
          NODE

      - name: Run local OAuth login UI drift tests
        run: npm run test:auth-drift -- e2e/auth-drift/oauth-staging-login-drift.spec.ts

      - name: Upload auth drift artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: auth-drift-local-login-ui
          path: |
            web/e2e/test-results/auth-drift/
            web/e2e/test-results/auth-drift-report/
            web/e2e/test-results/auth-drift-results/
            web/e2e/test-results/auth-drift-context/
          retention-days: 14
          if-no-files-found: ignore

  hosted-demo-no-login-drift:
    name: Hosted Demo No-Login Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web
    env:
      AUTH_DRIFT_JOB_NAME: Hosted Demo No-Login Drift
      AUTH_DRIFT_DEMO_URL: ${{ vars.AUTH_DRIFT_DEMO_URL || 'https://console.kubestellar.io' }}
      AUTH_DRIFT_DISABLE_WEBSERVER: '1'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/auth-drift-setup

      - name: Write auth drift context
        run: |
          mkdir -p e2e/test-results/auth-drift-context
          node <<'NODE'
          const fs = require('fs');
          const context = {
            job: process.env.AUTH_DRIFT_JOB_NAME,
            suite: 'hosted-demo-auth-drift.spec.ts',
            target: {
              type: 'hosted-demo-no-login',
              demoUrl: process.env.AUTH_DRIFT_DEMO_URL || 'https://console.kubestellar.io',
            },
            expectedContract: 'The public demo lands on the dashboard and exposes no login workflow.',
          };
          fs.writeFileSync('e2e/test-results/auth-drift-context/context.json', JSON.stringify(context, null, 2));
          NODE

      - name: Run hosted demo no-login drift tests
        run: npm run test:auth-drift -- e2e/auth-drift/hosted-demo-auth-drift.spec.ts

      - name: Upload auth drift artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: auth-drift-hosted-demo
          path: |
            web/e2e/test-results/auth-drift/
            web/e2e/test-results/auth-drift-report/
            web/e2e/test-results/auth-drift-results/
            web/e2e/test-results/auth-drift-context/
          retention-days: 14
          if-no-files-found: ignore

  localhost-login-dashboard-drift:
    name: Localhost Login Dashboard Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AUTH_DRIFT_JOB_NAME: Localhost Login Dashboard Drift
      AUTH_DRIFT_LOCAL_CONSOLE_URL: http://127.0.0.1:4176
      AUTH_DRIFT_LOCAL_BACKEND_URL: http://127.0.0.1:8081
      AUTH_DRIFT_DISABLE_WEBSERVER: '1'
      BACKEND_LISTEN_PORT: '8081'
      KC_AGENT_TOKEN: auth-drift-ci-agent-token

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: ./.github/actions/auth-drift-setup

      - name: Build backend
        run: |
          mkdir -p /tmp/auth-drift
          go build -o /tmp/auth-drift/console-bin ./cmd/console

      - name: Start backend
        run: |
          JWT_SECRET="auth-drift-ci-jwt-secret-placeholder-not-a-real-key" \
          DEV_MODE=true \
          PORT=8081 \
          FRONTEND_URL="${AUTH_DRIFT_LOCAL_CONSOLE_URL}" \
          DATABASE_PATH="/tmp/auth-drift/console.db" \
          KC_AGENT_TOKEN="${KC_AGENT_TOKEN}" \
          NO_LOCAL_AGENT=true \
          /tmp/auth-drift/console-bin > /tmp/auth-drift/backend.log 2>&1 &
          echo $! > /tmp/auth-drift/backend.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf "${AUTH_DRIFT_LOCAL_BACKEND_URL}/health" >/tmp/auth-drift/backend-health.json; then
              echo "Backend healthy after ${i}s"
              cat /tmp/auth-drift/backend-health.json
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend did not become healthy"
          cat /tmp/auth-drift/backend.log || true
          exit 1

      - name: Start Vite frontend
        working-directory: web
        run: |
          BACKEND_LISTEN_PORT="${BACKEND_LISTEN_PORT}" \
          VITE_DEV_MODE=true \
          npm run dev -- --host 127.0.0.1 --port 4176 > /tmp/auth-drift/vite.log 2>&1 &
          echo $! > /tmp/auth-drift/vite.pid
          npx wait-on "${AUTH_DRIFT_LOCAL_CONSOLE_URL}/login" --timeout 120000

      - name: Write auth drift context
        working-directory: web
        run: |
          mkdir -p e2e/test-results/auth-drift-context
          node <<'NODE'
          const fs = require('fs');
          const context = {
            job: process.env.AUTH_DRIFT_JOB_NAME,
            suite: 'localhost-login-dashboard-drift.spec.ts',
            target: {
              type: 'localhost-dev-mode-login-dashboard',
              consoleUrl: process.env.AUTH_DRIFT_LOCAL_CONSOLE_URL,
              backendUrl: process.env.AUTH_DRIFT_LOCAL_BACKEND_URL,
              devMode: true,
            },
            expectedContract: 'Localhost requires the login UI, the GitHub entry point reaches the backend auth route, and the browser lands on the dashboard.',
          };
          fs.writeFileSync('e2e/test-results/auth-drift-context/context.json', JSON.stringify(context, null, 2));
          NODE

      - name: Run localhost login dashboard drift tests
        working-directory: web
        run: npm run test:auth-drift -- e2e/auth-drift/localhost-login-dashboard-drift.spec.ts

      - name: Dump local server logs on failure
        if: failure()
        run: |
          echo "---- backend.log ----"
          cat /tmp/auth-drift/backend.log || true
          echo "---- vite.log ----"
          cat /tmp/auth-drift/vite.log || true

      - name: Stop local servers
        if: always()
        run: |
          if [ -f /tmp/auth-drift/vite.pid ]; then
            kill "$(cat /tmp/auth-drift/vite.pid)" 2>/dev/null || true
          fi
          if [ -f /tmp/auth-drift/backend.pid ]; then
            kill "$(cat /tmp/auth-drift/backend.pid)" 2>/dev/null || true
          fi

      - name: Upload auth drift artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: auth-drift-localhost-login-dashboard
          path: |
            web/e2e/test-results/auth-drift/
            web/e2e/test-results/auth-drift-report/
            web/e2e/test-results/auth-drift-results/
            web/e2e/test-results/auth-drift-context/
            /tmp/auth-drift/*.log
            /tmp/auth-drift/*health*.json
          retention-days: 14
          if-no-files-found: ignore

  fake-oauth-login-dashboard-drift:
    name: Fake OAuth Login Dashboard Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AUTH_DRIFT_JOB_NAME: Fake OAuth Login Dashboard Drift
      AUTH_DRIFT_FAKE_OAUTH_URL: http://127.0.0.1:4180
      AUTH_DRIFT_FAKE_OAUTH_CONSOLE_URL: http://127.0.0.1:4177
      AUTH_DRIFT_FAKE_OAUTH_BACKEND_URL: http://127.0.0.1:8082
      AUTH_DRIFT_DISABLE_WEBSERVER: '1'
      BACKEND_LISTEN_PORT: '8082'
      GITHUB_CLIENT_ID: auth-drift-client-id-12345
      GITHUB_CLIENT_SECRET: auth-drift-client-secret-1234567890
      KC_AGENT_TOKEN: auth-drift-ci-agent-token

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: ./.github/actions/auth-drift-setup

      - name: Build backend
        run: |
          mkdir -p /tmp/auth-drift-fake-oauth
          go build -o /tmp/auth-drift-fake-oauth/console-bin ./cmd/console

      - name: Start fake OAuth provider
        working-directory: web
        run: |
          node e2e/auth-drift/fake-github-oauth-provider.mjs > /tmp/auth-drift-fake-oauth/fake-oauth.log 2>&1 &
          echo $! > /tmp/auth-drift-fake-oauth/fake-oauth.pid
          npx wait-on "${AUTH_DRIFT_FAKE_OAUTH_URL}/health" --timeout 120000

      - name: Start backend
        run: |
          JWT_SECRET="auth-drift-ci-jwt-secret-placeholder-not-a-real-key" \
          DEV_MODE=false \
          GITHUB_URL="${AUTH_DRIFT_FAKE_OAUTH_URL}" \
          GITHUB_CLIENT_ID="${GITHUB_CLIENT_ID}" \
          GITHUB_CLIENT_SECRET="${GITHUB_CLIENT_SECRET}" \
          PORT=8082 \
          FRONTEND_URL="${AUTH_DRIFT_FAKE_OAUTH_CONSOLE_URL}" \
          DATABASE_PATH="/tmp/auth-drift-fake-oauth/console.db" \
          KC_AGENT_TOKEN="${KC_AGENT_TOKEN}" \
          NO_LOCAL_AGENT=true \
          SKIP_ONBOARDING=true \
          IGNORE_PERSISTED_OAUTH_CREDENTIALS=true \
          /tmp/auth-drift-fake-oauth/console-bin > /tmp/auth-drift-fake-oauth/backend.log 2>&1 &
          echo $! > /tmp/auth-drift-fake-oauth/backend.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf "${AUTH_DRIFT_FAKE_OAUTH_BACKEND_URL}/health" >/tmp/auth-drift-fake-oauth/backend-health.json; then
              echo "Backend healthy after ${i}s"
              cat /tmp/auth-drift-fake-oauth/backend-health.json
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend did not become healthy"
          cat /tmp/auth-drift-fake-oauth/backend.log || true
          exit 1

      - name: Start Vite frontend
        working-directory: web
        run: |
          BACKEND_LISTEN_PORT="${BACKEND_LISTEN_PORT}" \
          VITE_DEV_MODE=false \
          npm run dev -- --host 127.0.0.1 --port 4177 > /tmp/auth-drift-fake-oauth/vite.log 2>&1 &
          echo $! > /tmp/auth-drift-fake-oauth/vite.pid
          npx wait-on "${AUTH_DRIFT_FAKE_OAUTH_CONSOLE_URL}/login" --timeout 120000

      - name: Write auth drift context
        working-directory: web
        run: |
          mkdir -p e2e/test-results/auth-drift-context
          node <<'NODE'
          const fs = require('fs');
          const context = {
            job: process.env.AUTH_DRIFT_JOB_NAME,
            suite: 'fake-oauth-login-dashboard-drift.spec.ts',
            target: {
              type: 'localhost-fake-oauth-login-dashboard',
              consoleUrl: process.env.AUTH_DRIFT_FAKE_OAUTH_CONSOLE_URL,
              backendUrl: process.env.AUTH_DRIFT_FAKE_OAUTH_BACKEND_URL,
              providerUrl: process.env.AUTH_DRIFT_FAKE_OAUTH_URL,
              devMode: false,
            },
            expectedContract: 'Localhost requires login, then completes a real OAuth-style authorize, callback, token exchange, fake GitHub user fetch, HttpOnly cookie setup, and dashboard session without real credentials.',
          };
          fs.writeFileSync('e2e/test-results/auth-drift-context/context.json', JSON.stringify(context, null, 2));
          NODE

      - name: Run fake OAuth login dashboard drift tests
        working-directory: web
        run: npm run test:auth-drift -- e2e/auth-drift/fake-oauth-login-dashboard-drift.spec.ts

      - name: Dump fake OAuth server logs on failure
        if: failure()
        run: |
          echo "---- fake-oauth.log ----"
          cat /tmp/auth-drift-fake-oauth/fake-oauth.log || true
          echo "---- backend.log ----"
          cat /tmp/auth-drift-fake-oauth/backend.log || true
          echo "---- vite.log ----"
          cat /tmp/auth-drift-fake-oauth/vite.log || true

      - name: Stop fake OAuth local servers
        if: always()
        run: |
          if [ -f /tmp/auth-drift-fake-oauth/vite.pid ]; then
            kill "$(cat /tmp/auth-drift-fake-oauth/vite.pid)" 2>/dev/null || true
          fi
          if [ -f /tmp/auth-drift-fake-oauth/backend.pid ]; then
            kill "$(cat /tmp/auth-drift-fake-oauth/backend.pid)" 2>/dev/null || true
          fi
          if [ -f /tmp/auth-drift-fake-oauth/fake-oauth.pid ]; then
            kill "$(cat /tmp/auth-drift-fake-oauth/fake-oauth.pid)" 2>/dev/null || true
          fi

      - name: Upload auth drift artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: auth-drift-fake-oauth-login-dashboard
          path: |
            web/e2e/test-results/auth-drift/
            web/e2e/test-results/auth-drift-report/
            web/e2e/test-results/auth-drift-results/
            web/e2e/test-results/auth-drift-context/
            /tmp/auth-drift-fake-oauth/*.log
            /tmp/auth-drift-fake-oauth/*health*.json
          retention-days: 14
          if-no-files-found: ignore

  oauth-staging-drift:
    name: OAuth Staging Drift
    if: github.event_name != 'pull_request' && (github.event.inputs.auth_drift_login_url || vars.AUTH_DRIFT_LOGIN_URL)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web
    env:
      AUTH_DRIFT_JOB_NAME: OAuth Staging Drift
      AUTH_DRIFT_DISABLE_WEBSERVER: '1'
      AUTH_DRIFT_LOGIN_URL: ${{ github.event.inputs.auth_drift_login_url || vars.AUTH_DRIFT_LOGIN_URL }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/auth-drift-setup

      - name: Write auth drift context
        run: |
          mkdir -p e2e/test-results/auth-drift-context
          node <<'NODE'
          const fs = require('fs');
          const sanitizeUrl = (value) => {
            if (!value) return '';
            try {
              const url = new URL(value);
              url.username = '';
              url.password = '';
              url.search = '';
              url.hash = '';
              return url.toString();
            } catch {
              return 'invalid-url';
            }
          };
          const context = {
            job: process.env.AUTH_DRIFT_JOB_NAME,
            suite: 'oauth-staging-login-drift.spec.ts',
            target: {
              type: 'external-oauth-staging',
              loginUrl: sanitizeUrl(process.env.AUTH_DRIFT_LOGIN_URL),
            },
            expectedContract: 'OAuth staging login UI is stable and /auth/github redirects to GitHub authorize without leaking credentials.',
          };
          fs.writeFileSync('e2e/test-results/auth-drift-context/context.json', JSON.stringify(context, null, 2));
          NODE

      - name: Run OAuth staging login drift tests
        run: npm run test:auth-drift -- e2e/auth-drift/oauth-staging-login-drift.spec.ts

      - name: Upload auth drift artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: auth-drift-oauth-staging
          path: |
            web/e2e/test-results/auth-drift/
            web/e2e/test-results/auth-drift-report/
            web/e2e/test-results/auth-drift-results/
            web/e2e/test-results/auth-drift-context/
          retention-days: 14
          if-no-files-found: ignore
