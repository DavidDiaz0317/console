name: Auth Drift

on:
  push:
    branches:
      - auth-drift-pr-ready
    paths:
      - 'web/src/components/auth/**'
      - 'web/src/lib/auth.tsx'
      - 'web/src/lib/api.ts'
      - 'web/e2e/auth-drift/**'
      - 'web/package.json'
      - 'web/package-lock.json'
      - 'web/playwright.config.ts'
      - '.github/workflows/auth-drift.yml'
  pull_request:
    paths:
      - 'web/src/components/auth/**'
      - 'web/src/lib/auth.tsx'
      - 'web/src/lib/api.ts'
      - 'web/e2e/auth-drift/**'
      - 'web/package.json'
      - 'web/package-lock.json'
      - 'web/playwright.config.ts'
      - '.github/workflows/auth-drift.yml'
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      auth_drift_login_url:
        description: 'Optional OAuth-enabled console login URL to validate, for example https://staging.example.com/login'
        required: false
        default: ''
        type: string

permissions: read-all

concurrency:
  group: auth-drift-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  local-login-ui-drift:
    name: Local Login UI Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run local OAuth login UI drift tests
        run: npm run test:auth-drift -- e2e/auth-drift/oauth-staging-login-drift.spec.ts
        env:
          CI: 'true'

      - name: Upload auth drift artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: auth-drift-local-artifacts
          path: |
            web/e2e/test-results/auth-drift/
            web/e2e/test-results/auth-drift-report/
          retention-days: 14

  hosted-demo-no-login-drift:
    name: Hosted Demo No-Login Drift
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run hosted demo no-login drift tests
        run: npm run test:auth-drift -- e2e/auth-drift/hosted-demo-auth-drift.spec.ts
        env:
          AUTH_DRIFT_DEMO_URL: ${{ vars.AUTH_DRIFT_DEMO_URL }}
          AUTH_DRIFT_DISABLE_WEBSERVER: '1'
          CI: 'true'

      - name: Upload auth drift artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: auth-drift-hosted-demo-artifacts
          path: |
            web/e2e/test-results/auth-drift/
            web/e2e/test-results/auth-drift-report/
          retention-days: 14

  oauth-staging-drift:
    name: OAuth Staging Drift
    if: github.event_name != 'pull_request' && (github.event.inputs.auth_drift_login_url || vars.AUTH_DRIFT_LOGIN_URL)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run OAuth staging login drift tests
        run: npm run test:auth-drift -- e2e/auth-drift/oauth-staging-login-drift.spec.ts
        env:
          AUTH_DRIFT_DISABLE_WEBSERVER: '1'
          AUTH_DRIFT_LOGIN_URL: ${{ github.event.inputs.auth_drift_login_url || vars.AUTH_DRIFT_LOGIN_URL }}
          CI: 'true'

      - name: Upload auth drift artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: auth-drift-oauth-staging-artifacts
          path: |
            web/e2e/test-results/auth-drift/
            web/e2e/test-results/auth-drift-report/
          retention-days: 14
