name: Console Live Auto Update

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Optional image SHA to deploy
        required: false
        type: string
  workflow_run:
    workflows: ['Build and Deploy KC']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: console-live-auto-update
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: ghcr.io/daviddiaz0317/console
  LIVE_NAMESPACE: kubestellar-console-live
  LIVE_RELEASE: kc-live
  LIVE_DEPLOYMENT: kc-live-kubestellar-console
  LIVE_HOST: console-live.kubestellar.io
  LIVE_URL: https://console-live.kubestellar.io
  LIVE_TLS_SECRET: console-live-kubestellar-io-tls
  KUBECONFIG_SECRET_NAME: kc-live-kubeconfig
  GATE_SERVICE: console-live-gate
  GATE_CONFIGMAP: console-live-gate-nginx

jobs:
  deploy:
    name: Deploy Latest Main To Console Live
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.repository == 'DavidDiaz0317/console'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Validate secrets
        env:
          CONSOLE_LIVE_KUBECONFIG_B64: ${{ secrets.CONSOLE_LIVE_KUBECONFIG_B64 }}
          CONSOLE_LIVE_GATE_TOKEN: ${{ secrets.CONSOLE_LIVE_GATE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in CONSOLE_LIVE_KUBECONFIG_B64 CONSOLE_LIVE_GATE_TOKEN; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Configure kubeconfig
        env:
          CONSOLE_LIVE_KUBECONFIG_B64: ${{ secrets.CONSOLE_LIVE_KUBECONFIG_B64 }}
        shell: bash
        run: |
          set -euo pipefail
          deploy_kubeconfig="$RUNNER_TEMP/console-live-kubeconfig"
          printf '%s' "$CONSOLE_LIVE_KUBECONFIG_B64" | base64 -d > "$deploy_kubeconfig"
          chmod 600 "$deploy_kubeconfig"
          echo "KUBECONFIG=$deploy_kubeconfig" >> "$GITHUB_ENV"
          KUBECONFIG="$deploy_kubeconfig" kubectl -n "$LIVE_NAMESPACE" get deploy "$LIVE_DEPLOYMENT"

      - name: Resolve candidate image
        id: candidate
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.candidate_sha || '' }}" ]; then
            candidate_sha="${{ inputs.candidate_sha }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            candidate_sha="${{ github.event.workflow_run.head_sha }}"
          else
            candidate_sha="$(git ls-remote https://github.com/DavidDiaz0317/console.git refs/heads/main | awk '{print $1}')"
          fi
          if ! [[ "$candidate_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Candidate SHA must be a 40-character lowercase git SHA"
            exit 1
          fi
          candidate_image="${IMAGE_REPOSITORY}:${candidate_sha}"
          echo "sha=$candidate_sha" >> "$GITHUB_OUTPUT"
          echo "image=$candidate_image" >> "$GITHUB_OUTPUT"
          for i in {1..12}; do
            if docker buildx imagetools inspect "$candidate_image" >/dev/null; then
              echo "Resolved candidate image $candidate_image"
              exit 0
            fi
            echo "Candidate image not visible yet; retry $i/12"
            sleep 10
          done
          echo "::error::Candidate image is not available in GHCR: $candidate_image"
          exit 1

      - name: Apply cookie gate
        env:
          CONSOLE_LIVE_GATE_TOKEN: ${{ secrets.CONSOLE_LIVE_GATE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/console-live-gate.yaml" <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: ${GATE_CONFIGMAP}
            namespace: ${LIVE_NAMESPACE}
          data:
            nginx.conf: |
              events {}
              http {
                map \$http_upgrade \$connection_upgrade {
                  default upgrade;
                  '' close;
                }

                server {
                  listen 8080;
                  absolute_redirect off;

                  location = /__gate_health {
                    access_log off;
                    return 200 "ok\n";
                  }

                  location = /unlock/${CONSOLE_LIVE_GATE_TOKEN} {
                    add_header Set-Cookie "console_live_gate=${CONSOLE_LIVE_GATE_TOKEN}; Path=/; Secure; HttpOnly; SameSite=Lax" always;
                    return 302 ${LIVE_URL}/;
                  }

                  location / {
                    if (\$cookie_console_live_gate != "${CONSOLE_LIVE_GATE_TOKEN}") {
                      return 403;
                    }

                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection \$connection_upgrade;
                    proxy_read_timeout 3600s;
                    proxy_send_timeout 3600s;
                    proxy_pass http://${LIVE_RELEASE}-kubestellar-console:8080;
                  }
                }
              }
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${GATE_SERVICE}
            namespace: ${LIVE_NAMESPACE}
            labels:
              app.kubernetes.io/name: ${GATE_SERVICE}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: ${GATE_SERVICE}
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: ${GATE_SERVICE}
              spec:
                containers:
                  - name: nginx
                    image: nginx:1.27-alpine
                    imagePullPolicy: IfNotPresent
                    ports:
                      - name: http
                        containerPort: 8080
                    volumeMounts:
                      - name: nginx-config
                        mountPath: /etc/nginx/nginx.conf
                        subPath: nginx.conf
                    readinessProbe:
                      httpGet:
                        path: /__gate_health
                        port: http
                      initialDelaySeconds: 3
                      periodSeconds: 5
                volumes:
                  - name: nginx-config
                    configMap:
                      name: ${GATE_CONFIGMAP}
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${GATE_SERVICE}
            namespace: ${LIVE_NAMESPACE}
            labels:
              app.kubernetes.io/name: ${GATE_SERVICE}
          spec:
            type: ClusterIP
            selector:
              app.kubernetes.io/name: ${GATE_SERVICE}
            ports:
              - name: http
                port: 8080
                targetPort: http
          EOF
          kubectl apply -f "$RUNNER_TEMP/console-live-gate.yaml"
          kubectl -n "$LIVE_NAMESPACE" rollout restart "deployment/$GATE_SERVICE"
          kubectl -n "$LIVE_NAMESPACE" rollout status "deployment/$GATE_SERVICE" --timeout=3m

      - name: Upgrade Console release
        shell: bash
        run: |
          set -euo pipefail
          values="$RUNNER_TEMP/console-live-values.yaml"
          cat > "$values" <<EOF
          image:
            repository: "$IMAGE_REPOSITORY"
            tag: "${{ steps.candidate.outputs.sha }}"
            pullPolicy: Always
          service:
            type: ClusterIP
          kubeconfig:
            existingSecret: "$KUBECONFIG_SECRET_NAME"
          ingress:
            enabled: true
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-http01
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
            hosts:
              - host: "$LIVE_HOST"
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: "$LIVE_TLS_SECRET"
                hosts:
                  - "$LIVE_HOST"
          rbac:
            resourceQuotasReadOnly: true
            namespaceCreationEnabled: false
          extraEnv:
            - name: DEV_MODE
              value: "true"
            - name: CLUSTER_BACKED_MODE
              value: "true"
          EOF
          helm upgrade --install "$LIVE_RELEASE" ./deploy/helm/kubestellar-console \
            --namespace "$LIVE_NAMESPACE" \
            --reuse-values \
            -f "$values" \
            --atomic \
            --cleanup-on-fail \
            --wait \
            --timeout 10m

      - name: Route ingress through gate
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "$LIVE_NAMESPACE" annotate ingress "${LIVE_RELEASE}-kubestellar-console" \
            nginx.ingress.kubernetes.io/whitelist-source-range- \
            nginx.ingress.kubernetes.io/auth-type- \
            nginx.ingress.kubernetes.io/auth-secret- \
            nginx.ingress.kubernetes.io/auth-realm- \
            --overwrite || true
          kubectl -n "$LIVE_NAMESPACE" patch ingress "${LIVE_RELEASE}-kubestellar-console" \
            --type=json \
            -p="[{\"op\":\"replace\",\"path\":\"/spec/rules/0/http/paths/0/backend/service/name\",\"value\":\"$GATE_SERVICE\"}]"

      - name: Verify live update
        env:
          CONSOLE_LIVE_GATE_TOKEN: ${{ secrets.CONSOLE_LIVE_GATE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "$LIVE_NAMESPACE" rollout status "deployment/$LIVE_DEPLOYMENT" --timeout=3m
          live_image="$(kubectl -n "$LIVE_NAMESPACE" get deploy "$LIVE_DEPLOYMENT" -o jsonpath='{.spec.template.spec.containers[0].image}')"
          if [ "$live_image" != "${{ steps.candidate.outputs.image }}" ]; then
            echo "::error::Live image mismatch. got=$live_image want=${{ steps.candidate.outputs.image }}"
            exit 1
          fi
          public_code="$(curl -sS -o /dev/null -w '%{http_code}' "$LIVE_URL/")"
          if [ "$public_code" != "403" ]; then
            echo "::error::Expected locked live URL to return 403 without gate cookie, got $public_code"
            exit 1
          fi
          unlocked_code="$(curl -sS -o /dev/null -w '%{http_code}' --cookie "console_live_gate=$CONSOLE_LIVE_GATE_TOKEN" "$LIVE_URL/health")"
          if [ "$unlocked_code" != "200" ]; then
            echo "::error::Expected unlocked live health to return 200, got $unlocked_code"
            exit 1
          fi
          echo "console-live now runs $live_image behind the cookie gate."
