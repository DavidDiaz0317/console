name: Console Live Promote

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: 'Optional fork main image SHA to promote'
        required: false
        type: string
      promoteProduction:
        description: 'Upgrade production after canary passes'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  workflow_run:
    workflows: ['Build and Deploy KC']
    types: [completed]
    branches: [main]
permissions:
  contents: read
  packages: read

concurrency:
  group: console-live-promote
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: ghcr.io/daviddiaz0317/console
  FORK_REPOSITORY: DavidDiaz0317/console
  LIVE_NAMESPACE: kubestellar-console-live
  LIVE_RELEASE: kc-live
  LIVE_DEPLOYMENT: kc-live-kubestellar-console
  LIVE_HOST: console-live.kubestellar.io
  LIVE_URL: https://console-live.kubestellar.io
  LIVE_TLS_SECRET: console-live-kubestellar-io-tls
  CANARY_NAMESPACE: kubestellar-console-live-canary
  CANARY_RELEASE: kc-live-canary
  OAUTH_SECRET_NAME: kc-live-github-oauth
  KUBECONFIG_SECRET_NAME: kc-live-kubeconfig
  LIVE_CLUSTER_CONTEXTS: ${{ vars.LIVE_CLUSTER_CONTEXTS || 'ks-console-ci-1,ks-console-ci-2,ks-console-ci-3' }}
  LIVE_CLUSTER_EXPECTED_CONTEXTS: ${{ vars.LIVE_CLUSTER_EXPECTED_CONTEXTS || '3' }}
  LIVE_CLUSTER_EXPECTED_READY_NODES: ${{ vars.LIVE_CLUSTER_EXPECTED_READY_NODES || '6' }}
  LIVE_CLUSTER_FIXTURES: ${{ vars.LIVE_CLUSTER_FIXTURES || 'false' }}
  LIVE_CLUSTER_FIXTURE_CONTEXT: ${{ vars.LIVE_CLUSTER_FIXTURE_CONTEXT || 'ks-console-ci-1' }}
  LIVE_FIXTURE_NAMESPACE: ${{ vars.LIVE_FIXTURE_NAMESPACE || 'ks-live-ui-fixtures' }}
  LIVE_SITE_AI_AUDIT: ${{ vars.LIVE_SITE_AI_AUDIT || 'off' }}
  CONSOLE_LIVE_ALLOWED_GITHUB_LOGINS: ${{ secrets.CONSOLE_LIVE_ALLOWED_GITHUB_LOGINS || vars.CONSOLE_LIVE_ALLOWED_GITHUB_LOGINS || 'DavidDiaz0317' }}
  CONSOLE_LIVE_ADMIN_GITHUB_LOGINS: ${{ secrets.CONSOLE_LIVE_ADMIN_GITHUB_LOGINS || vars.CONSOLE_LIVE_ADMIN_GITHUB_LOGINS || 'DavidDiaz0317' }}
  PROMOTE_PRODUCTION: ${{ inputs.promoteProduction || 'true' }}
  CANDIDATE_SHA_INPUT: ${{ inputs.candidate_sha || '' }}

jobs:
  promote:
    name: Canary Test And Promote
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.repository == 'DavidDiaz0317/console'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate required deployment secrets
        env:
          CONSOLE_LIVE_KUBECONFIG_B64: ${{ secrets.CONSOLE_LIVE_KUBECONFIG_B64 }}
          CONSOLE_LIVE_OAUTH_CLIENT_ID: ${{ secrets.CONSOLE_LIVE_OAUTH_CLIENT_ID }}
          CONSOLE_LIVE_OAUTH_CLIENT_SECRET: ${{ secrets.CONSOLE_LIVE_OAUTH_CLIENT_SECRET }}
          CONSOLE_LIVE_JWT_SECRET: ${{ secrets.CONSOLE_LIVE_JWT_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            CONSOLE_LIVE_KUBECONFIG_B64 \
            CONSOLE_LIVE_OAUTH_CLIENT_ID \
            CONSOLE_LIVE_OAUTH_CLIENT_SECRET \
            CONSOLE_LIVE_JWT_SECRET; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Configure deploy kubeconfig
        env:
          CONSOLE_LIVE_KUBECONFIG_B64: ${{ secrets.CONSOLE_LIVE_KUBECONFIG_B64 }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/console-live"
          deploy_kubeconfig="$RUNNER_TEMP/console-live/deploy-kubeconfig"
          printf '%s' "$CONSOLE_LIVE_KUBECONFIG_B64" | base64 -d > "$deploy_kubeconfig"
          chmod 600 "$deploy_kubeconfig"
          echo "DEPLOY_KUBECONFIG=$deploy_kubeconfig" >> "$GITHUB_ENV"
          KUBECONFIG="$deploy_kubeconfig" kubectl config get-contexts

      - name: Configure groundtruth kubeconfig
        id: groundtruth-kubeconfig
        env:
          GROUNDTRUTH_KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        shell: bash
        run: |
          set -euo pipefail
          groundtruth_kubeconfig="$RUNNER_TEMP/console-live/groundtruth-kubeconfig"
          if [ -n "${GROUNDTRUTH_KUBECONFIG_B64:-}" ]; then
            printf '%s' "$GROUNDTRUTH_KUBECONFIG_B64" | base64 -d > "$groundtruth_kubeconfig"
          else
            cp "$DEPLOY_KUBECONFIG" "$groundtruth_kubeconfig"
          fi
          chmod 600 "$groundtruth_kubeconfig"
          echo "path=$groundtruth_kubeconfig" >> "$GITHUB_OUTPUT"

      - name: Resolve candidate image
        id: candidate
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${CANDIDATE_SHA_INPUT:-}" ]; then
            candidate_sha="$CANDIDATE_SHA_INPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            candidate_sha="${{ github.event.workflow_run.head_sha }}"
          else
            candidate_sha="$(git ls-remote "https://github.com/${FORK_REPOSITORY}.git" refs/heads/main | awk '{print $1}')"
          fi
          if ! [[ "$candidate_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Candidate SHA must be a 40-character lowercase git SHA"
            exit 1
          fi
          candidate_image="${IMAGE_REPOSITORY}:${candidate_sha}"
          echo "sha=$candidate_sha" >> "$GITHUB_OUTPUT"
          echo "image=$candidate_image" >> "$GITHUB_OUTPUT"
          for i in 1 2 3; do
            if docker buildx imagetools inspect "$candidate_image" >/dev/null; then
              echo "Resolved candidate image $candidate_image"
              exit 0
            fi
            echo "Candidate image not visible yet; retry $i/3"
            sleep 15
          done
          echo "::error::Candidate image is not available in GHCR: $candidate_image"
          exit 1

      - name: Check current live image
        id: live-state
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$DEPLOY_KUBECONFIG"
          current_image="$(kubectl -n "$LIVE_NAMESPACE" get deploy "$LIVE_DEPLOYMENT" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
          echo "current_image=${current_image:-missing}" >> "$GITHUB_OUTPUT"
          if [ "$current_image" = "${{ steps.candidate.outputs.image }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Live already runs $current_image"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Live currently runs ${current_image:-missing}; candidate is ${{ steps.candidate.outputs.image }}"
          fi

      - name: Prepare live and canary secrets
        if: steps.live-state.outputs.skip != 'true'
        env:
          CONSOLE_LIVE_OAUTH_CLIENT_ID: ${{ secrets.CONSOLE_LIVE_OAUTH_CLIENT_ID }}
          CONSOLE_LIVE_OAUTH_CLIENT_SECRET: ${{ secrets.CONSOLE_LIVE_OAUTH_CLIENT_SECRET }}
          CONSOLE_LIVE_JWT_SECRET: ${{ secrets.CONSOLE_LIVE_JWT_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$DEPLOY_KUBECONFIG"
          for ns in "$LIVE_NAMESPACE" "$CANARY_NAMESPACE"; do
            kubectl -n "$ns" create secret generic "$OAUTH_SECRET_NAME" \
              --from-literal=github-client-id="$CONSOLE_LIVE_OAUTH_CLIENT_ID" \
              --from-literal=github-client-secret="$CONSOLE_LIVE_OAUTH_CLIENT_SECRET" \
              --from-literal=jwt-secret="$CONSOLE_LIVE_JWT_SECRET" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

          kubectl -n "$LIVE_NAMESPACE" get secret "$KUBECONFIG_SECRET_NAME" -o json \
            | jq 'del(.metadata.annotations, .metadata.creationTimestamp, .metadata.resourceVersion, .metadata.uid, .metadata.managedFields, .metadata.ownerReferences) | .metadata.namespace = env.CANARY_NAMESPACE' \
            | kubectl apply -f -

      - name: Deploy private canary
        if: steps.live-state.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$DEPLOY_KUBECONFIG"
          helm upgrade --install "$CANARY_RELEASE" ./deploy/helm/kubestellar-console \
            --namespace "$CANARY_NAMESPACE" \
            --set image.repository="$IMAGE_REPOSITORY" \
            --set image.tag="${{ steps.candidate.outputs.sha }}" \
            --set image.pullPolicy=Always \
            --set service.type=ClusterIP \
            --set persistence.enabled=true \
            --set persistence.ephemeral=true \
            --set backup.enabled=false \
            --set jwt.existingSecret="$OAUTH_SECRET_NAME" \
            --set kubeconfig.existingSecret="$KUBECONFIG_SECRET_NAME" \
            --set rbac.create=false \
            --set rbac.resourceQuotasReadOnly=true \
            --set rbac.namespaceCreationEnabled=false \
            --set extraEnv[0].name=DEV_MODE \
            --set-string extraEnv[0].value=true \
            --set extraEnv[1].name=CLUSTER_BACKED_MODE \
            --set-string extraEnv[1].value=true \
            --atomic \
            --cleanup-on-fail \
            --wait \
            --timeout 10m

      - name: Install web test dependencies
        if: steps.live-state.outputs.skip != 'true'
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        if: steps.live-state.outputs.skip != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Port-forward private canary
        if: steps.live-state.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$DEPLOY_KUBECONFIG"
          kubectl --request-timeout=0 -n "$CANARY_NAMESPACE" port-forward "svc/${CANARY_RELEASE}-kubestellar-console" 18080:8080 \
            > "$RUNNER_TEMP/console-live/canary-port-forward.log" 2>&1 &
          echo "CANARY_PORT_FORWARD_PID=$!" >> "$GITHUB_ENV"
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null || curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/console-live/canary-port-forward.log" || true
          echo "::error::Canary port-forward did not become healthy"
          exit 1

      - name: Run canary live groundtruth tests
        if: steps.live-state.outputs.skip != 'true'
        working-directory: web
        env:
          PROMOTE_PRODUCTION: ''
          KUBECONFIG: ${{ steps.groundtruth-kubeconfig.outputs.path }}
          LIVE_CLUSTER_FIXTURE_KUBECONFIG_B64: ${{ secrets.LIVE_CLUSTER_FIXTURE_KUBECONFIG_B64 }}
          LIVE_CLUSTER_FIXTURES: ${{ vars.LIVE_CLUSTER_FIXTURES || 'true' }}
          LIVE_CLUSTER_FIXTURE_CLEANUP: ${{ vars.LIVE_CLUSTER_FIXTURE_CLEANUP || 'true' }}
          LIVE_CLUSTER_TESTS: 'true'
          LIVE_SITE_TESTS: 'true'
          LIVE_SITE_AUTH_MODE: dev
          LIVE_CANARY_CONSOLE_URL: http://127.0.0.1:18080
          LIVE_PRODUCTION_CONSOLE_URL: ${{ env.LIVE_URL }}
          SELF_HOSTED_CONSOLE_URL: http://127.0.0.1:18080
        run: npm run test:visual:live

      - name: Ensure canary port-forward for browser matrix
        if: always() && steps.live-state.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$DEPLOY_KUBECONFIG"
          if curl -fsS http://127.0.0.1:18080/health >/dev/null || curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
            exit 0
          fi

          if [ -n "${CANARY_PORT_FORWARD_PID:-}" ]; then
            kill "$CANARY_PORT_FORWARD_PID" >/dev/null 2>&1 || true
          fi

          kubectl --request-timeout=0 -n "$CANARY_NAMESPACE" port-forward "svc/${CANARY_RELEASE}-kubestellar-console" 18080:8080 \
            > "$RUNNER_TEMP/console-live/canary-browser-matrix-port-forward.log" 2>&1 &
          echo "CANARY_PORT_FORWARD_PID=$!" >> "$GITHUB_ENV"
          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null || curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/console-live/canary-browser-matrix-port-forward.log" || true
          echo "::error::Canary browser matrix port-forward did not become healthy"
          exit 1

      - name: Run canary browser matrix tests
        if: always() && steps.live-state.outputs.skip != 'true'
        working-directory: web
        env:
          PROMOTE_PRODUCTION: ''
          KUBECONFIG: ${{ steps.groundtruth-kubeconfig.outputs.path }}
          LIVE_CLUSTER_TESTS: 'true'
          LIVE_SITE_TESTS: 'true'
          LIVE_SITE_AUTH_MODE: dev
          BROWSER_MATRIX_BASELINES: ${{ vars.BROWSER_MATRIX_BASELINES || 'false' }}
          LIVE_CANARY_CONSOLE_URL: http://127.0.0.1:18080
          LIVE_PRODUCTION_CONSOLE_URL: ${{ env.LIVE_URL }}
          SELF_HOSTED_CONSOLE_URL: http://127.0.0.1:18080
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$DEPLOY_KUBECONFIG"

          ensure_canary_port_forward() {
            if curl -fsS http://127.0.0.1:18080/health >/dev/null || curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              return 0
            fi
            if [ -n "${CANARY_PORT_FORWARD_PID:-}" ]; then
              kill "$CANARY_PORT_FORWARD_PID" >/dev/null 2>&1 || true
            fi
            kubectl --request-timeout=0 -n "$CANARY_NAMESPACE" port-forward "svc/${CANARY_RELEASE}-kubestellar-console" 18080:8080 \
              >> "$RUNNER_TEMP/console-live/canary-browser-matrix-port-forward.log" 2>&1 &
            CANARY_PORT_FORWARD_PID=$!
            echo "CANARY_PORT_FORWARD_PID=$CANARY_PORT_FORWARD_PID" >> "$GITHUB_ENV"
            for _ in {1..60}; do
              if curl -fsS http://127.0.0.1:18080/health >/dev/null || curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
                return 0
              fi
              sleep 2
            done
            cat "$RUNNER_TEMP/console-live/canary-browser-matrix-port-forward.log" || true
            echo "::error::Canary browser matrix port-forward did not become healthy"
            return 1
          }

          status=0
          for project in live-chromium live-firefox live-webkit; do
            ensure_canary_port_forward || status=1
            npx playwright test --config e2e/visual-login/browser-matrix.config.ts --project "$project" || status=1
          done
          exit "$status"

      - name: Compare canary browser matrix
        if: always() && steps.live-state.outputs.skip != 'true'
        working-directory: web
        run: npm run test:visual:browser-matrix:compare

      - name: Upload console live promote evidence
        if: always() && steps.live-state.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: console-live-promote-evidence
          path: |
            web/test-results/results.json
            web/test-results/evidence/
            web/test-results/reports/
            web/test-results/reports/browser-matrix/
            web/test-results/reports/browser-matrix.json
            web/test-results/browser-matrix/
            web/test-results/browser-matrix-results/
            web/test-results/visual-login-intensive/
            web/e2e/visual-login/test-results/results.json
            web/e2e/visual-login/test-results/evidence/
            web/e2e/visual-login/test-results/visual-login-intensive/
            ${{ runner.temp }}/console-live/canary-port-forward.log
            ${{ runner.temp }}/console-live/canary-browser-matrix-port-forward.log
          if-no-files-found: warn
          retention-days: 14

      - name: Run test adequacy analyzer
        if: steps.live-state.outputs.skip != 'true'
        working-directory: web
        run: npm run test:visual:adequacy

      - name: Promote candidate to production
        if: steps.live-state.outputs.skip != 'true' && env.PROMOTE_PRODUCTION == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$DEPLOY_KUBECONFIG"
          prod_values="$RUNNER_TEMP/console-live/prod-values.yaml"
          cat > "$prod_values" <<EOF
          image:
            repository: "$IMAGE_REPOSITORY"
            tag: "${{ steps.candidate.outputs.sha }}"
            pullPolicy: Always
          clusterName: ks-console-ci-1
          service:
            type: ClusterIP
          podSecurityContext:
            seccompProfile:
              type: RuntimeDefault
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
          github:
            existingSecret: "$OAUTH_SECRET_NAME"
          jwt:
            existingSecret: "$OAUTH_SECRET_NAME"
          kubeconfig:
            existingSecret: "$KUBECONFIG_SECRET_NAME"
          ingress:
            enabled: true
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-http01
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
            hosts:
              - host: "$LIVE_HOST"
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: "$LIVE_TLS_SECRET"
                hosts:
                  - "$LIVE_HOST"
          auth:
            allowedGitHubLogins: "$CONSOLE_LIVE_ALLOWED_GITHUB_LOGINS"
            adminGitHubLogins: "$CONSOLE_LIVE_ADMIN_GITHUB_LOGINS"
          rbac:
            resourceQuotasReadOnly: true
            namespaceCreationEnabled: false
          extraEnv:
            - name: DEV_MODE
              value: "false"
            - name: CLUSTER_BACKED_MODE
              value: "true"
          EOF
          helm upgrade --install "$LIVE_RELEASE" ./deploy/helm/kubestellar-console \
            --namespace "$LIVE_NAMESPACE" \
            --create-namespace \
            --reset-values \
            -f "$prod_values" \
            --atomic \
            --cleanup-on-fail \
            --wait \
            --timeout 10m

      - name: Verify production security and image
        if: steps.live-state.outputs.skip != 'true' && env.PROMOTE_PRODUCTION == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$DEPLOY_KUBECONFIG"
          kubectl -n "$LIVE_NAMESPACE" rollout status "deployment/$LIVE_DEPLOYMENT" --timeout=3m
          live_image="$(kubectl -n "$LIVE_NAMESPACE" get deploy "$LIVE_DEPLOYMENT" -o jsonpath='{.spec.template.spec.containers[0].image}')"
          if [ "$live_image" != "${{ steps.candidate.outputs.image }}" ]; then
            echo "::error::Live image mismatch. got=$live_image want=${{ steps.candidate.outputs.image }}"
            exit 1
          fi

          if ! curl -fsS "$LIVE_URL/health" >/dev/null && ! curl -fsS "$LIVE_URL/healthz" >/dev/null; then
            echo "::error::Live health endpoint is not reachable"
            exit 1
          fi

          api_code="$(curl -sS -o /dev/null -w '%{http_code}' "$LIVE_URL/api/me")"
          if [ "$api_code" != "401" ]; then
            echo "::error::Unauthenticated /api/me returned HTTP $api_code, expected 401"
            exit 1
          fi

          cert_ready="$(kubectl -n "$LIVE_NAMESPACE" get certificate -o json \
            | jq -r --arg secret "$LIVE_TLS_SECRET" '.items[] | select(.spec.secretName == $secret) | .status.conditions[]? | select(.type == "Ready") | .status' \
            | tail -n1)"
          if [ "$cert_ready" != "True" ]; then
            echo "::error::TLS certificate for $LIVE_HOST is not Ready"
            exit 1
          fi

      - name: Stop canary port-forward
        if: always()
        shell: bash
        run: |
          if [ -n "${CANARY_PORT_FORWARD_PID:-}" ]; then
            kill "$CANARY_PORT_FORWARD_PID" 2>/dev/null || true
          fi

      - name: Clean up canary
        if: always()
        shell: bash
        run: |
          set +e
          if [ -n "${DEPLOY_KUBECONFIG:-}" ]; then
            export KUBECONFIG="$DEPLOY_KUBECONFIG"
            helm uninstall "$CANARY_RELEASE" -n "$CANARY_NAMESPACE" --wait --timeout 2m || true
          fi
