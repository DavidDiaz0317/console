name: Visual Baseline Regen

# Deterministic, on-demand baseline regeneration for a specific PR. Unlike the agent-driven
# path (implement-fix), this runs entirely in CI: it checks out the PR head branch, rebuilds
# the app, regenerates the Linux visual baselines, and pushes them back to the PR branch.
# Use this as the reliable fallback when the fix agent's sandbox cannot produce baselines.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to regenerate visual baselines for.
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

env:
  PREVIEW_PORT: '4173'
  PREVIEW_WAIT_SECONDS: '30'
  SNAPSHOT_PATHSPEC: 'web/e2e/visual/**/*-snapshots/*.png'

jobs:
  regen-baselines:
    name: Regenerate visual baselines for PR
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Resolve PR head branch
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          HEAD_REF=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json headRefName --jq '.headRefName')
          if [ -z "$HEAD_REF" ]; then
            echo "::error::Could not resolve head branch for PR #${PR_NUMBER}."
            exit 1
          fi
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "::notice::Regenerating baselines for PR #${PR_NUMBER} on branch ${HEAD_REF}."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.resolve.outputs.head_ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Start preview server
        working-directory: web
        run: nohup npm run preview -- --port "$PREVIEW_PORT" > /tmp/preview.log 2>&1 &

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Wait for preview server
        run: timeout "$PREVIEW_WAIT_SECONDS" bash -c 'until curl -sf "http://localhost:${PREVIEW_PORT}" > /dev/null; do sleep 1; done'

      - name: Regenerate baseline snapshots
        working-directory: web
        run: npm run test:visual:update
        env:
          CI: 'true'
          APP_VISUAL_BASE_URL: 'http://localhost:4173'

      - name: Commit and push regenerated baselines
        env:
          HEAD_REF: ${{ steps.resolve.outputs.head_ref }}
        run: |
          CHANGED=$(git status --porcelain -- "$SNAPSHOT_PATHSPEC")
          if [ -z "$CHANGED" ]; then
            echo "::notice::No baseline changes after regeneration; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- "$SNAPSHOT_PATHSPEC"
          git commit -m "chore: regenerate visual baselines for PR #${{ inputs.pr_number }}"
          git push origin "HEAD:${HEAD_REF}"
          echo "::notice::Pushed regenerated baselines to ${HEAD_REF}."
