name: Visual Login PR Protection

on:
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: visual-login-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  PR_VISUAL_USE_HOSTED_DEMO: 'false'
  VISUAL_LOGIN_AUTH_MODE: demo

jobs:
  visual-login-pr:
    name: Fast Visual/Login Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run fast visual/login PR tests
        run: npm run test:visual:pr

      - name: Build PR summary
        if: always()
        run: npm run test:visual:report:pr

      - name: Upload sanitized visual/login artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-login-pr-sanitized-artifacts
          path: |
            web/test-results/evidence/
            web/test-results/reports/
          if-no-files-found: ignore
          retention-days: 7
