name: Dashboard Lint
on:
  push:
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and syntax-check inline JavaScript
        run: |
          find dashboard -name '*.html' -print0 | while IFS= read -r -d '' html_file; do
            echo "Checking $html_file..."
            # Extract all <script> blocks — pass filename via argv, not string interpolation
            node -e "
              const fs = require('fs');
              const html = fs.readFileSync(process.argv[1], 'utf8');
              const re = /<script[^>]*>([\s\S]*?)<\/script>/gi;
              let match, idx = 0;
              while ((match = re.exec(html)) !== null) {
                const js = match[1].trim();
                if (!js) continue;
                const outFile = '/tmp/block_' + idx + '.js';
                fs.writeFileSync(outFile, js);
                idx++;
              }
              console.log('Extracted ' + idx + ' script block(s)');
            " "$html_file"
            # Syntax-check each extracted block
            for block in /tmp/block_*.js; do
              [ -f "$block" ] || continue
              echo "  Parsing $(basename "$block")..."
              node --check "$block"
            done
            rm -f /tmp/block_*.js
          done
          echo "All script blocks passed syntax check."
