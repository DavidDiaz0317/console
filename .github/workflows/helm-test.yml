name: Helm Chart Test

on:
  pull_request:
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm-test.yml'
  push:
    branches: [main]
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm-test.yml'
  workflow_call: {}

# Minimum permissions: checkout only — no write scopes needed
permissions:
  contents: read

jobs:
  helm-lint-and-template:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | \
            tar xz -C /usr/local/bin kubeconform

      - name: Helm lint (default values)
        run: helm lint deploy/helm/kubestellar-console

      - name: Helm lint (OpenShift values)
        run: |
          helm lint deploy/helm/kubestellar-console \
            -f deploy/helm/kubestellar-console/values.yaml \
            -f deploy/helm/kubestellar-console/values-openshift.yaml

      - name: Template — default values
        run: |
          helm template kc deploy/helm/kubestellar-console \
            --namespace kc \
            > /tmp/helm-default.yaml
          echo "Rendered $(grep -c '^kind:' /tmp/helm-default.yaml) resources (default values)"

      - name: Template — OpenShift values
        run: |
          helm template kc deploy/helm/kubestellar-console \
            --namespace kc \
            -f deploy/helm/kubestellar-console/values.yaml \
            -f deploy/helm/kubestellar-console/values-openshift.yaml \
            --set route.enabled=true \
            --set route.host=console.apps.example.com \
            > /tmp/helm-openshift.yaml
          echo "Rendered $(grep -c '^kind:' /tmp/helm-openshift.yaml) resources (OpenShift values)"

      - name: Template — all optional features enabled
        run: |
          helm template kc deploy/helm/kubestellar-console \
            --namespace kc \
            --set ingress.enabled=true \
            --set ingress.className=nginx \
            --set ingress.hosts[0].host=console.example.com \
            --set ingress.hosts[0].paths[0].path=/ \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set networkPolicy.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set github.clientId=test-id \
            --set github.clientSecret=test-secret \
            --set claude.apiKey=test-key \
            --set githubToken.token=test-token \
            --set feedbackGithubToken.token=test-token \
            --set googleDrive.apiKey=test-key \
            --set watchdog.enabled=true \
            > /tmp/helm-full.yaml
          echo "Rendered $(grep -c '^kind:' /tmp/helm-full.yaml) resources (all features)"

      - name: Template — minimal (no persistence, no RBAC)
        run: |
          helm template kc deploy/helm/kubestellar-console \
            --namespace kc \
            --set persistence.enabled=false \
            --set rbac.create=false \
            --set serviceAccount.create=false \
            --set watchdog.enabled=false \
            > /tmp/helm-minimal.yaml
          echo "Rendered $(grep -c '^kind:' /tmp/helm-minimal.yaml) resources (minimal)"

      - name: Template - secure console-live values
        run: |
          helm template kc-live deploy/helm/kubestellar-console \
            --namespace kubestellar-console-live \
            --set image.repository=ghcr.io/daviddiaz0317/console \
            --set image.tag=test-sha \
            --set image.pullPolicy=Always \
            --set service.type=ClusterIP \
            --set github.existingSecret=kc-live-github-oauth \
            --set jwt.existingSecret=kc-live-github-oauth \
            --set kubeconfig.existingSecret=kc-live-kubeconfig \
            --set auth.allowedGitHubLogins=DavidDiaz0317 \
            --set auth.adminGitHubLogins=DavidDiaz0317 \
            --set ingress.enabled=true \
            --set ingress.className=nginx \
            --set ingress.hosts[0].host=console-live.kubestellar.io \
            --set ingress.hosts[0].paths[0].path=/ \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set ingress.tls[0].secretName=console-live-kubestellar-io-tls \
            --set ingress.tls[0].hosts[0]=console-live.kubestellar.io \
            --set extraEnv[0].name=DEV_MODE \
            --set-string extraEnv[0].value=false \
            --set extraEnv[1].name=CLUSTER_BACKED_MODE \
            --set-string extraEnv[1].value=true \
            > /tmp/helm-console-live.yaml

          grep -q 'type: ClusterIP' /tmp/helm-console-live.yaml
          ! grep -q 'type: LoadBalancer' /tmp/helm-console-live.yaml
          grep -q 'name: GITHUB_CLIENT_ID' /tmp/helm-console-live.yaml
          grep -q 'name: kc-live-github-oauth' /tmp/helm-console-live.yaml
          grep -q 'name: AUTH_ALLOWED_GITHUB_LOGINS' /tmp/helm-console-live.yaml
          grep -q 'name: AUTH_ADMIN_GITHUB_LOGINS' /tmp/helm-console-live.yaml
          grep -q 'name: DEV_MODE' /tmp/helm-console-live.yaml
          grep -q 'value: "false"' /tmp/helm-console-live.yaml
          test "$(grep -c 'name: FRONTEND_URL' /tmp/helm-console-live.yaml)" -eq 1
          echo "Rendered $(grep -c '^kind:' /tmp/helm-console-live.yaml) resources (secure console-live values)"

      - name: Kubeconform — validate default
        run: |
          kubeconform -strict -summary \
            -kubernetes-version 1.30.0 \
            -skip Route \
            /tmp/helm-default.yaml

      - name: Kubeconform — validate OpenShift
        run: |
          # Skip OpenShift Route CRD (no schema available in upstream)
          kubeconform -strict -summary \
            -kubernetes-version 1.30.0 \
            -skip Route \
            /tmp/helm-openshift.yaml

      - name: Kubeconform — validate all features
        run: |
          kubeconform -strict -summary \
            -kubernetes-version 1.30.0 \
            -skip Route \
            /tmp/helm-full.yaml

      - name: Kubeconform — validate minimal
        run: |
          kubeconform -strict -summary \
            -kubernetes-version 1.30.0 \
            -skip Route \
            /tmp/helm-minimal.yaml

      - name: Kubeconform - validate secure console-live
        run: |
          kubeconform -strict -summary \
            -kubernetes-version 1.30.0 \
            -skip Route \
            /tmp/helm-console-live.yaml

      - name: Verify no empty/broken templates
        run: |
          for f in /tmp/helm-default.yaml /tmp/helm-openshift.yaml /tmp/helm-full.yaml /tmp/helm-minimal.yaml /tmp/helm-console-live.yaml; do
            BASENAME=$(basename "$f")
            RESOURCE_COUNT=$(grep -c '^kind:' "$f")
            if [ "$RESOURCE_COUNT" -lt 2 ]; then
              echo "ERROR: $BASENAME rendered only $RESOURCE_COUNT resources — chart may be broken"
              exit 1
            fi
            echo "OK: $BASENAME has $RESOURCE_COUNT resources"
          done

      - name: Summary
        if: always()
        run: |
          echo "## Helm Chart Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Resources |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|" >> $GITHUB_STEP_SUMMARY
          for f in /tmp/helm-default.yaml /tmp/helm-openshift.yaml /tmp/helm-full.yaml /tmp/helm-minimal.yaml /tmp/helm-console-live.yaml; do
            BASENAME=$(basename "$f" .yaml | sed 's/helm-//')
            COUNT=$(grep -c '^kind:' "$f" 2>/dev/null || echo 0)
            echo "| $BASENAME | $COUNT |" >> $GITHUB_STEP_SUMMARY
          done
