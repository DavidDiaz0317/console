name: 'Auth Drift Setup'
description: 'Set up Node, install web dependencies, and install the Playwright Chromium browser for auth-drift jobs.'

# Shared setup for every auth-drift job. The calling job must run
# actions/checkout BEFORE using this local composite action.
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install web dependencies
      shell: bash
      working-directory: web
      run: npm ci

    - name: Install Playwright Chromium
      shell: bash
      working-directory: web
      run: npx playwright install --with-deps chromium
